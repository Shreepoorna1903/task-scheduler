apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-scheduler-api
  labels:
    app: task-scheduler
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-scheduler
      component: api
  template:
    metadata:
      labels:
        app: task-scheduler
        component: api
    spec:
      containers:
      - name: api
        image: task-scheduler:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8081
          name: admin
        env:
        - name: JAVA_OPTS
          value: "-Xmx512m"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthcheck
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthcheck
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: task-scheduler-api
spec:
  type: LoadBalancer
  selector:
    app: task-scheduler
    component: api
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  - port: 8081
    targetPort: 8081
    name: admin